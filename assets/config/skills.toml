description = "基础的武器攻击"
damage_type = "Physical"
element = "None"

[skills.normal_attack.damage]
base = 50
scaling = "strength"
multiplier = 1.0

[skills.normal_attack.cost]
stamina = 10

[skills.normal_attack.cooldown]
base = 0.5

[skills.normal_attack.animation]
