# ============================================
# 剑技系列
# ============================================

[skills.horizontal_slash]
name = "水平斩"
name_en = "Horizontal Slash"
description = "从左向右的水平斩击，对前方扇形区域造成伤害"
damage_type = "Physical"
element = "None"

[skills.horizontal_slash.damage]
base = 120
scaling = "strength"
multiplier = 1.5

[skills.horizontal_slash.cost]
mp = 15
stamina = 25

[skills.horizontal_slash.cooldown]
base = 1.0

[skills.horizontal_slash.animation]
name = "skill_horizontal_slash"
duration = 0.8
hitbox_start = 0.3
hitbox_end = 0.5
hitbox_arc = 90
hitbox_range = 3.0
knockback = 1.0

[skills.horizontal_slash.combo]
chain_into = ["vertical_slash", "sonic_impact"]
combo_multiplier = 1.2

[skills.horizontal_slash.triggers]
voice_keywords = ["水平斩", "横扫", "横斩", "horizontal"]
gesture_required = true
keybind = "Digit1"

[skills.horizontal_slash.unlock]
level = 1
skill_points = 0

