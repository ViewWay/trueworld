# ============================================
# 防御技能
# ============================================

[skills.parry]
name = "格挡"
name_en = "Parry"
description = "完美格挡敌人的攻击并反击"
damage_type = "None"
element = "None"

[skills.parry.damage]
reflection = 0.5  # 反弹 50% 伤害

[skills.parry.cost]
stamina = 20

[skills.parry.cooldown]
base = 0.8

[skills.parry.animation]
name = "parry"
duration = 0.4
