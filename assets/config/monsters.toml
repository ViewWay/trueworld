# ============================================
# Boss 怪物
# ============================================

[monsters.forest_guardian]
name = "森林守护者"
name_en = "Forest Guardian"
monster_type = "Boss"
level = 15
model = "monsters/boss/forest_guardian.glb"

[monsters.forest_guardian.stats]
hp = 5000
attack = 100
defense = 30
speed = 4.0
aggro_range = 20.0
attack_range = 5.0

[monsters.forest_guardian.behavior]
ai_type = "Boss"
phases = 3

[monsters.forest_guardian.phase1]
abilities = ["root_attack", "vine_whip"]
hp_threshold = 0.66

[monsters.forest_guardian.phase2]
abilities = ["forest_wrath", "summon_treants"]
hp_threshold = 0.33

[monsters.forest_guardian.phase3]
abilities = ["ultimate_nature", "enrage"]
hp_threshold = 0.0

[monsters.forest_guardian.drops]
exp = 5000
gold_min = 1000
gold_max = 2000
items = [
    { id = "forest_heart", chance = 0.3, quantity = [1, 1] },
    { id = "guardian_sword", chance = 0.1, quantity = [1, 1] },
    { id = "guardian_armor", chance = 0.1, quantity = [1, 1] }
]

# 特殊掉落
[monsters.forest_guardian.special_drops.first_time]
items = [
    { id = "title_forest_slayer", chance = 1.0, quantity = [1, 1] }
]

