    { id = "dragon_scale", chance = 0.8, quantity = [1, 3] },
    { id = "dragon_bone", chance = 0.5, quantity = [1, 2] }
]

# ============================================
# 世界 Boss
# ============================================

[monsters.world_boss.dragonlord]
name = "龙皇"
name_en = "Dragonlord"
monster_type = "Boss"
level = 100
model = "monsters/boss/dragonlord.glb"

[monsters.world_boss.dragonlord.stats]
hp = 100000
attack = 500
defense = 100
magic_resist = 150
speed = 8.0

[monsters.world_boss.dragonlord.behavior]
ai_type = "Boss"
phases = 5

# 基础攻击
[monsters.world_boss.dragonlord.basic_attacks]
melee = { damage = 800, range = 8 }
fire_breath = { damage = 1200, range = 30, cone = 60 }
tail_ail = { damage = 600, aoe = true }

# 技能
[monsters.world_boss.dragonlord.skills]
summon_minions = { count = 10, type = "drake" }
enrage = { trigger = 0.5, stats_boost = 2.0 }
devastation = { damage = 2000, aoe = true }
time_stop = { duration = 3 }  # 停止玩家

[monsters.world_boss.dragonlord.drops]
exp = 50000
gold_min = 10000
gold_max = 20000
items = [
    { id = "dragonlord_heart", chance = 0.5, quantity = [1, 1] },
    { id = "legendary_dragon_sword", chance = 0.1, quantity = [1, 1] },
    { id = "title_dragonslayer", chance = 0.05, quantity = [1, 1] }
]

# 世界公告
[monsters.world_boss.dragonlord.announcement]
first_kill = true
drops_unique_title = true
