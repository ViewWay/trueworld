# TrueWorld - Monsters Configuration
# 怪物定义文件

# ============================================
# 1级区域怪物
# ============================================

[monsters.slime]
name = "史莱姆"
name_en = "Slime"
monster_type = "Normal"
level = 1
icon = "monsters/slime.png"
model = "monsters/slime/slime.glb"

[monsters.slime.stats]
hp = 50
attack = 10
defense = 0
magic_resist = 0
speed = 2.0
aggro_range = 3.0
attack_range = 1.0

[monsters.slime.behavior]
ai_type = "Passive"
patrol = false
flee_on_low_hp = false

[monsters.slime.drops]
exp = 10
gold_min = 1
gold_max = 5
items = [
    { id = "slime_gel", chance = 0.5, quantity = [1, 2] },
    { id = "health_potion_small", chance = 0.01, quantity = [1, 1] }
]

[monsters.slime.respawn]
time = 60  # 秒

